apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tautulli
  namespace: tortuga
spec:
  replicas: 1
  serviceName: tautulli
  selector:
    matchLabels:
      app: tautulli
  template:
    metadata:
      labels:
        app: tautulli
    spec:
      securityContext:
        fsGroup: ${plexGid}
      initContainers:
        - name: import-data
          image: busybox:1.38.0
          command:
            - sh
            - -c
            # BE VERY CAREFUL WITH TRAILING SEMICOLONS
            - >
              if test "$DANGER_CLEAR_EXISTING_DATA" = "true"; then
                for f in /config/{*,.*}; do
                  if test "$f" = "/config/." || test "$f" = "/config/.."; then
                    continue;
                  fi;
                  echo "Removing $f recursively...";
                  rm -f "$f";
                done;
                rm -rf /config/*;
              elif test -f /config/import-data-complete; then
                exit 0;
              fi;
              while test ! -f /import/import-data-ready; do
                sleep 1;
              done;
              echo "Extracting data...";
              tar -xvf /import/import.tar.gz -C /config;
              echo "Extraction complete.";
              touch /config/import-data-complete;
              exit 0;
          env:
            - name: DANGER_CLEAR_EXISTING_DATA
              value: "false"
          volumeMounts:
            - name: tautulli-config-pvc
              mountPath: /config
            - name: import
              mountPath: /import
      containers:
        - image: ghcr.io/tautulli/tautulli:latest@sha256:f66f65c3e5b60b94eb9dc9848fbe983009b4705f1795e4c979b961251c9637ad
          name: tautulli
          ports:
            - containerPort: 8181
          env:
            - name: PUID
              value: ${quote}${plexUid}${quote}
            - name: PGID
              value: ${quote}${plexGid}${quote}
            - name: TZ
              value: ${timezone}
          volumeMounts:
            - mountPath: /config
              name: tautulli-config-pvc
              readOnly: false
      volumes:
        - name: import
          emptyDir: {}
        - name: tautulli-config-pvc
          persistentVolumeClaim:
            claimName: tautulli-config-pvc
