apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: tautulli
  namespace: tortuga
  annotations:
    kubernetes.io/ingress.class: traefik-tailscale
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Tautulli
    gethomepage.dev/group: Media
    gethomepage.dev/icon: tautulli
    gethomepage.dev/href: https://tautulli.${productionClusterFqdn}
    # Widget: add gethomepage.dev/widget.key with your Tautulli API key to enable
    gethomepage.dev/widget.type: tautulli
    gethomepage.dev/widget.url: http://tautulli.tortuga
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`tautulli.${productionClusterFqdn}`)
      kind: Rule
      services:
        - name: tautulli
          kind: Service
          port: 80
      middlewares:
        - name: authelia
          namespace: authelia
  tls:
    secretName: seedbox-wildcard-backing-secret
