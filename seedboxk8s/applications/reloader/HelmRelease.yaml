apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reloader
  namespace: reloader
spec:
  chart:
    spec:
      chart: reloader
      version: 1.3.0
      sourceRef:
        kind: HelmRepository
        name: stakater
        namespace: flux-system
  interval: 15m
  timeout: 5m
  releaseName: reloader
  values:
    reloader:
      watchGlobally: true
      reloadOnCreate: true
      syncAfterRestart: true
