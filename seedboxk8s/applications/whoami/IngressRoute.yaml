apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: whoami-ingress-route
  namespace: whoami
  annotations:
    kubernetes.io/ingress.class: traefik-tailscale
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Whoami
    gethomepage.dev/group: Infrastructure
    gethomepage.dev/icon: mdi-help-network-outline
    gethomepage.dev/href: https://whoami.${productionClusterFqdn}
    gethomepage.dev/pod-selector: app.kubernetes.io/name=whoami
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`whoami.${productionClusterFqdn}`)
      kind: Rule
      services:
        - name: whoami-service
          kind: Service
          port: 80
      middlewares:
        - name: authelia
          namespace: authelia
  tls:
    secretName: seedbox-wildcard-backing-secret
