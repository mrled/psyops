apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: shhh
  namespace: tortuga
  annotations:
    kubernetes.io/ingress.class: traefik-tailscale
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Shhh
    gethomepage.dev/group: Ao
    gethomepage.dev/icon: whisparr
    gethomepage.dev/href: https://shhh.${productionClusterFqdn}

spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`shhh.${productionClusterFqdn}`)
      kind: Rule
      services:
        - name: shhh
          kind: Service
          port: 80
      middlewares:
        - name: authelia
          namespace: authelia
  tls:
    secretName: seedbox-wildcard-backing-secret
