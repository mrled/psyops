apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: pubfiles
  namespace: tortuga
  annotations:
    kubernetes.io/ingress.class: traefik-tailscale
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`pubfiles.${productionClusterFqdn}`)
      kind: Rule
      services:
        - name: pubfiles
          kind: Service
          port: 80
  tls:
    secretName: seedbox-wildcard-backing-secret
