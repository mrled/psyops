# After this Secret is populated by Kubernetes, create a kubeconfig with:
# TOKEN="$(kubectl -n kube-access get secret claudebox-token -o jsonpath='{.data.token}' | base64 -d)"
# CA_DATA="$(kubectl -n kube-access get secret claudebox-token -o jsonpath='{.data.ca\.crt}')"
# SERVER="$(kubectl config view --minify -o jsonpath='{.clusters[0].cluster.server}')"
# kubectl config set-cluster seedboxk8s --server="$SERVER" --certificate-authority-data="$CA_DATA" --embed-certs=true --kubeconfig=claudebox.kubeconfig
# kubectl config set-credentials claudebox --token="$TOKEN" --kubeconfig=claudebox.kubeconfig
# kubectl config set-context claudebox@seedboxk8s --cluster=seedboxk8s --user=claudebox --namespace=default --kubeconfig=claudebox.kubeconfig
apiVersion: v1
kind: Secret
metadata:
  name: claudebox-token
  namespace: kube-access
  annotations:
    kubernetes.io/service-account.name: claudebox
type: kubernetes.io/service-account-token
