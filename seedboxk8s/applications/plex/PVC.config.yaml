apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: plex-config-pvc
  namespace: tortuga
  annotations:
    backup.seedboxk8s.micahrl.com/enabled: "true"
    backup.seedboxk8s.micahrl.com/keep-daily: 2
    backup.seedboxk8s.micahrl.com/keep-weekly: 2
    backup.seedboxk8s.micahrl.com/keep-monthly: 8
    backup.seedboxk8s.micahrl.com/keep-yearly: 3
    # Notes:
    # /source/Library/Application Support/Plex Media Server/Plug-In Support/Databases/*.db-*
    #   This keeps *.db, but excludes .db-shm and .db-DATESTAMP files
    backup.seedboxk8s.micahrl.com/exclude: |
      /source/Library/Application Support/Plex Media Server/Cache
      /source/Library/Application Support/Plex Media Server/Codecs
      /source/Library/Application Support/Plex Media Server/Crash Reports
      /source/Library/Application Support/Plex Media Server/Diagnostics
      /source/Library/Application Support/Plex Media Server/Drivers
      /source/Library/Application Support/Plex Media Server/Logs
      /source/Library/Application Support/Plex Media Server/Media
      /source/Library/Application Support/Plex Media Server/Plug-In Support/Caches
      /source/Library/Application Support/Plex Media Server/Plug-In Support/Databases/*.db-*
      /source/Library/Application Support/Plex Media Server/Plug-In Support/Metadata Combination
      /source/Library/Application Support/Plex Media Server/Updates
      /source/lost+found
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: seedbox-slow-mirror
  resources:
    requests:
      storage: 15Gi
