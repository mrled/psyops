apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: plex-tailscale-https
  namespace: tortuga
  annotations:
    kubernetes.io/ingress.class: traefik-tailscale
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Plex
    gethomepage.dev/group: Media
    gethomepage.dev/icon: plex
    gethomepage.dev/href: https://plex.${productionClusterFqdn}
    gethomepage.dev/pod-selector: app.kubernetes.io/name=plex
    # Widget: add gethomepage.dev/widget.key with your Plex token (X-Plex-Token) to enable
    gethomepage.dev/widget.type: plex
    gethomepage.dev/widget.url: http://plex.tortuga:32400
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`plex.${productionClusterFqdn}`)
      kind: Rule
      services:
        - name: plex
          kind: Service
          port: 32400
  tls:
    secretName: seedbox-wildcard-backing-secret
