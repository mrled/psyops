apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cops-config-pvc
  namespace: tortuga
  annotations:
    backup.seedboxk8s.micahrl.com/enabled: "true"
    backup.seedboxk8s.micahrl.com/keep-daily: 2
    backup.seedboxk8s.micahrl.com/keep-weekly: 2
    backup.seedboxk8s.micahrl.com/keep-monthly: 8
    backup.seedboxk8s.micahrl.com/keep-yearly: 3
    backup.seedboxk8s.micahrl.com/exclude: |
      /source/cache
      /source/log
      /source/lost+found
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: seedbox-slow-mirror
  resources:
    requests:
      storage: 1Gi
