apiVersion: batch/v1
kind: Job
metadata:
  name: $JOB_NAME
  namespace: $NAMESPACE
  labels:
    app.kubernetes.io/name: kvrb
    app.kubernetes.io/component: volume-backup
  annotations:
    kvrb.seedboxk8s.micahrl.com/pvc-namespace: $NAMESPACE
    kvrb.seedboxk8s.micahrl.com/pvc-name: $PVC_NAME
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kvrb
        app.kubernetes.io/component: volume-backup
      annotations:
        kvrb.seedboxk8s.micahrl.com/pvc-namespace: $NAMESPACE
        kvrb.seedboxk8s.micahrl.com/pvc-name: $PVC_NAME
    spec:
      restartPolicy: Never
      containers:
        - name: restic
          image: alpine:3.22
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: $SECRET_NAME
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: RESTIC_EXCLUDES
              value: "$RESTIC_EXCLUDES"
          command: ["/bin/sh", "-ceu"]
          args:
            - |
              apk add --no-cache ca-certificates restic
              restic version

              echo "Checking restic repository"
              restic snapshots || {
                echo "Initializing restic repository"
                restic init
              }

              exclude_args=""
              if test -n "$${RESTIC_EXCLUDES:-}"; then
                printf '%s\n' "$${RESTIC_EXCLUDES}" | tr ';' '\n' > /tmp/restic-excludes
                echo "Using restic exclude file:"
                cat /tmp/restic-excludes
                exclude_args="--exclude-file /tmp/restic-excludes"
              fi

              echo "Backing up $SOURCE_MOUNT"
              restic backup "$SOURCE_MOUNT" $${exclude_args} \
                --host seedboxk8s \
                --tag namespace=$${POD_NAMESPACE} \
                --tag pvc=$PVC_NAME \
                --verbose

              echo "Applying restic retention policy"
              restic forget \
                --keep-daily $RESTIC_KEEP_DAILY \
                --keep-weekly $RESTIC_KEEP_WEEKLY \
                --keep-monthly $RESTIC_KEEP_MONTHLY \
                --keep-yearly $RESTIC_KEEP_YEARLY \
                --prune
          volumeMounts:
            - name: source
              mountPath: $SOURCE_MOUNT
              readOnly: true
      volumes:
        - name: source
          persistentVolumeClaim:
            claimName: $PVC_NAME
            readOnly: true
