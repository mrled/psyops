apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opensearch
  namespace: opensearch
spec:
  chart:
    spec:
      chart: opensearch
      version: 3.7.0
      sourceRef:
        kind: HelmRepository
        name: opensearch
        namespace: flux-system
  interval: 15m
  timeout: 10m
  releaseName: opensearch
  valuesFrom:
    - kind: ConfigMap
      name: opensearch-values
      valuesKey: values.yaml
