apiVersion: v1
kind: ConfigMap
metadata:
  name: opensearch-dashboards-values
  namespace: opensearch
data:
  values.yaml: |
    replicaCount: 1

    # HTTP since OpenSearch has SSL disabled on the HTTP layer
    opensearchHosts: "https://opensearch-cluster-master:9200"

    # Credentials for the opensearch-dashboards internal user
    opensearchAccount:
      secret: opensearch-dashboards-account

    config:
      opensearch_dashboards.yml: |
        server.host: '0.0.0.0'
        opensearch.ssl.verificationMode: none
        opensearch_security.auth.type: "proxy"
        opensearch_security.proxycache.user_header: "remote-user"
        opensearch_security.proxycache.roles_header: "remote-groups"

    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        memory: 1Gi

    ingress:
      enabled: false
