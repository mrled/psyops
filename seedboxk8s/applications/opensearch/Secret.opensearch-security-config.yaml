# OpenSearch security configuration
# The Helm chart expects that this is a secret.
# Bcrypt hashes are safe to store in git unencrypted.
# To generate a hash: htpasswd -bnBC 12 "" <password> | tr -d ':\n'
# Or: python3 -c "import bcrypt; print(bcrypt.hashpw(b'yourpassword', bcrypt.gensalt(12)).decode())"
# Fill in the hash: fields below before applying.
apiVersion: v1
kind: Secret
metadata:
  name: opensearch-security-config
  namespace: opensearch
stringData:
  config.yml: |
    _meta:
      type: "config"
      config_version: 2
    config:
      dynamic:
        http:
          anonymous_auth_enabled: false
        authc:
          proxy_auth_domain:
            description: "Authenticate via X-Forwarded-User from Authelia"
            http_enabled: true
            transport_enabled: false
            order: 0
            http_authenticator:
              type: proxy
              challenge: false
              config:
                user_header: "X-Forwarded-User"
                roles_header: "X-Forwarded-Groups"
            authentication_backend:
              type: noop
          basic_internal_auth_domain:
            description: "Authenticate via HTTP Basic against internal users database"
            http_enabled: true
            transport_enabled: true
            order: 1
            http_authenticator:
              type: basic
              challenge: false
            authentication_backend:
              type: intern

  internal_users.yml: |
    _meta:
      type: "internalusers"
      config_version: 2
    admin:
      hash: "$2y$12$vSfZFJDaHt5qZ4/v77WnQexEbv1nDEeY8cpvabqYNjleaxpnfH3ji"
      reserved: true
      backend_roles:
        - "admin"
      description: "Admin user"
    fluent-bit:
      hash: "$2y$12$ULJo/0vCXsd6WrX7fptCg.8yMnTOfyp5qRF4JsbeBLOiOUBsXD6OK"
      reserved: false
      backend_roles:
        - "fluent-bit"
      description: "Fluent Bit log shipper - write only, no delete"
    opensearch-dashboards:
      hash: "$2y$12$RmrmsXY5wJEVIW.G3rmcxuitgqy5fLLGvtKgbRdIrMnBTMbP85eZC"
      reserved: false
      backend_roles:
        - "opensearch-dashboards"
      description: "OpenSearch Dashboards"

  roles.yml: |
    _meta:
      type: "roles"
      config_version: 2
    fluent_bit_writer:
      description: "Write logs, no delete permissions"
      cluster_permissions:
        - "cluster_monitor"
        - "cluster:admin/ingest/pipeline/get"
      index_permissions:
        - index_patterns:
            - "k8s-logs-*"
          allowed_actions:
            - "indices:data/write/bulk*"
            - "indices:data/write/index"
            - "indices:admin/create"
            - "indices:admin/mapping/put"
            - "indices:admin/template/get"
            - "indices:admin/template/put"

  roles_mapping.yml: |
    _meta:
      type: "rolesmapping"
      config_version: 2
    fluent_bit_writer:
      backend_roles:
        - "fluent-bit"
    all_access:
      reserved: true
      backend_roles:
        - "admin"
        - "opensearch-dashboards"
      users:
        - "freeleech"

  nodes_dn.yml: |
    _meta:
      type: "nodesdn"
      config_version: 2

  action_groups.yml: |
    _meta:
      type: "actiongroups"
      config_version: 2

  tenants.yml: |
    _meta:
      type: "tenants"
      config_version: 2
    global_tenant:
      reserved: true
      description: "Global tenant"
