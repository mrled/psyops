apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: transmission
  namespace: tortuga
spec:
  replicas: 1
  serviceName: transmission
  selector:
    matchLabels:
      app.kubernetes.io/name: transmission
  template:
    metadata:
      labels:
        app.kubernetes.io/name: transmission
    spec:
      securityContext:
        fsGroup: ${plexGid}
      initContainers:
        - name: import-data
          image: busybox:1.38.0
          command:
            - sh
            - -c
            # BE VERY CAREFUL WITH TRAILING SEMICOLONS
            - >
              if test "$DANGER_CLEAR_EXISTING_DATA" = "true"; then
                for f in /config/{*,.*}; do
                  if test "$f" = "/config/." || test "$f" = "/config/.."; then
                    continue;
                  fi;
                  echo "Removing $f recursively...";
                  rm -f "$f";
                done;
                rm -rf /config/*;
              elif test -f /config/import-data-complete; then
                exit 0;
              fi;
              while test ! -f /import/import-data-ready; do
                sleep 1;
              done;
              echo "Extracting data...";
              tar -xvf /import/import.tar.gz -C /config;
              echo "Extraction complete.";
              touch /config/import-data-complete;
              exit 0;
          env:
            - name: DANGER_CLEAR_EXISTING_DATA
              value: "false"
          volumeMounts:
            - name: transmission-config-pvc
              mountPath: /config
            - name: import
              mountPath: /import
      containers:
        # https://github.com/linuxserver/docker-transmission/releases
        - image: lscr.io/linuxserver/transmission:4.0.6-r4-ls294
          name: transmission
          env:
            - name: PUID
              value: ${quote}${plexUid}${quote}
            - name: PGID
              value: ${quote}${plexGid}${quote}
            - name: TZ
              value: ${timezone}
            - name: PEERPORT
              value: ${quote}${transmissionPeerPort}${quote}
          ports:
            - containerPort: 9091
            - containerPort: ${transmissionPeerPort}
              protocol: TCP
            - containerPort: ${transmissionPeerPort}
              protocol: UDP
          volumeMounts:
            - mountPath: /config
              name: transmission-config-pvc
              readOnly: false
            - mountPath: /media
              name: seedboxmedia-nfs
              readOnly: false
      volumes:
        - name: import
          emptyDir: {}
        - name: transmission-config-pvc
          persistentVolumeClaim:
            claimName: transmission-config-pvc
        - name: seedboxmedia-nfs
          persistentVolumeClaim:
            claimName: seedboxmedia-nfs-pvc
