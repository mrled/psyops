apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lidarr-config-pvc
  namespace: tortuga
  annotations:
    backup.seedboxk8s.micahrl.com/enabled: "true"
    backup.seedboxk8s.micahrl.com/exclude: |
      /source/logs
      /source/MediaCover
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: seedbox-slow-mirror
  resources:
    requests:
      storage: 10Gi
