apiVersion: v1
kind: ConfigMap
metadata:
  name: authelia
  namespace: authelia
data:
  configuration.yaml: |
    ---
    theme: auto

    server:
      address: tcp://0.0.0.0:9091
      endpoints:
        authz:
          forward-auth:
            implementation: ForwardAuth

    log:
      level: debug
      format: text
      keep_stdout: true

    authentication_backend:
      file:
        path: /users/users.yml
        watch: false
        search:
          email: true
        password:
          algorithm: argon2
          argon2:
            variant: argon2id

    session:
      name: authelia_session
      same_site: lax
      inactivity: 24h
      expiration: 24h
      remember_me: 90d
      cookies:
        - domain: ${productionClusterFqdn}
          authelia_url: https://auth.${productionClusterFqdn}
          default_redirection_url: https://whoami-authelia.${productionClusterFqdn}

    storage:
      local:
        path: /config/db.sqlite3

    notifier:
      disable_startup_check: true
      filesystem:
        filename: /config/notification.txt

    access_control:
      default_policy: deny
      rules:
        - domain:
            - whoami-authelia.${productionClusterFqdn}
            - opensearch.${productionClusterFqdn}
          policy: one_factor
