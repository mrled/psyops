apiVersion: v1
kind: ConfigMap
metadata:
  name: redict-config
  namespace: authelia
  labels:
    app.kubernetes.io/name: redict
data:
  redict.conf: |
    port 6379
    protected-mode no
    aclfile /redict-secret/users.acl
    loglevel notice
    dir /data
    appendonly yes
    appendfilename "appendonly.aof"
