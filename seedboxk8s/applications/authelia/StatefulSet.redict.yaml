apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redict
  namespace: authelia
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  serviceName: redict-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redict
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redict
    spec:
      enableServiceLinks: false
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: init
          image: busybox:1.38.0
          command:
            - sh
            - -c
            - chown 1000:1000 /data
          volumeMounts:
            - name: redict-data
              mountPath: /data
      containers:
        - name: redict
          image: registry.redict.io/redict:7
          command:
            - redict-server
            - /redict-config/redict.conf
          ports:
            - name: redict
              containerPort: 6379
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: redict-data
              mountPath: /data
            - name: redict-secret
              mountPath: /redict-secret
              readOnly: true
            - name: redict-config
              mountPath: /redict-config
              readOnly: true
      volumes:
        - name: redict-secret
          secret:
            secretName: redict-secret
        - name: redict-config
          configMap:
            name: redict-config
  volumeClaimTemplates:
    - metadata:
        name: redict-data
        annotations:
          backup.seedboxk8s.micahrl.com/enabled: "true"
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: seedbox-bootdisk-fast-single
        resources:
          requests:
            storage: 1Gi
