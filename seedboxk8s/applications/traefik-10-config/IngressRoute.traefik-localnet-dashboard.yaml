apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-localnet-dashboard
  namespace: traefik
  annotations:
    kubernetes.io/ingress.class: traefik-tailscale
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Traefik (Localnet)
    gethomepage.dev/group: Infrastructure
    gethomepage.dev/icon: traefik
    gethomepage.dev/href: https://traefik-localnet.${productionClusterFqdn}/dashboard/
spec:
  entryPoints:
    - websecure
  routes:
    # Don't forget that there is nothing at the root of this service;
    # the dashboard is at /dashboard/
    # (and the trailing slash is important!)
    - match: Host(`traefik-localnet.${productionClusterFqdn}`)
      kind: Rule
      services:
        - name: traefik-localnet-dashboard
          kind: Service
          port: 80
      middlewares:
        - name: authelia
          namespace: authelia
  tls:
    secretName: seedbox-wildcard-backing-secret
