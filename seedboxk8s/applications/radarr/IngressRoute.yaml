apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: radarr
  namespace: tortuga
  annotations:
    kubernetes.io/ingress.class: traefik-tailscale
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Radarr
    gethomepage.dev/group: Media
    gethomepage.dev/icon: radarr
    gethomepage.dev/href: https://radarr.${productionClusterFqdn}
    # Widget: add gethomepage.dev/widget.key with your Radarr API key to enable
    gethomepage.dev/widget.type: radarr
    gethomepage.dev/widget.url: http://radarr.tortuga
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`radarr.${productionClusterFqdn}`)
      kind: Rule
      services:
        - name: radarr
          kind: Service
          port: 80
      middlewares:
        - name: authelia
          namespace: authelia
  tls:
    secretName: seedbox-wildcard-backing-secret
