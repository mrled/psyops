apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: clustergit-repositories-lvm-pvc
  namespace: clustergit
  annotations:
    backup.seedboxk8s.micahrl.com/enabled: "false"
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: seedbox-slow-mirror
  resources:
    requests:
      storage: 5Gi
