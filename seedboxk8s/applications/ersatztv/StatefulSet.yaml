apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ersatztv
  namespace: tortuga
spec:
  replicas: 1
  serviceName: ersatztv
  selector:
    matchLabels:
      app: ersatztv
  template:
    metadata:
      labels:
        app: ersatztv
    spec:
      securityContext:
        fsGroup: ${plexGid}
      initContainers:
        - name: import-data
          image: busybox:1.38.0
          command:
            - sh
            - -c
            # BE VERY CAREFUL WITH TRAILING SEMICOLONS
            - >
              if test "$DANGER_CLEAR_EXISTING_DATA" = "true"; then
                for f in /config/{*,.*}; do
                  if test "$f" = "/config/." || test "$f" = "/config/.."; then
                    continue;
                  fi;
                  echo "Removing $f recursively...";
                  rm -f "$f";
                done;
                rm -rf /config/*;
              elif test -f /config/import-data-complete; then
                exit 0;
              fi;
              while test ! -f /import/import-data-ready; do
                sleep 1;
              done;
              echo "Extracting data...";
              tar -xvf /import/import.tar.gz -C /config;
              echo "Extraction complete.";
              touch /config/import-data-complete;
              exit 0;
          env:
            - name: DANGER_CLEAR_EXISTING_DATA
              value: "false"
          volumeMounts:
            - name: ersatztv-config-pvc
              mountPath: /config
            - name: import
              mountPath: /import
      containers:
        - image: ghcr.io/ersatztv/legacy:develop@sha256:3efbc08479f461e0fc69d277dea3f9055e24f86b879312d6d54d1d86bc847584
          name: ersatztv
          ports:
            - containerPort: 8409
          env:
            - name: TZ
              value: ${timezone}
            - name: XDG_DATA_HOME
              value: /config
          securityContext:
            runAsUser: ${plexUid}
            runAsGroup: ${plexGid}
          volumeMounts:
            - mountPath: /config
              name: ersatztv-config-pvc
              readOnly: false
            - mountPath: /media
              name: seedboxmedia-nfs
              readOnly: true
            - mountPath: /dev/dri
              name: dev-dri
              readOnly: false
      volumes:
        - name: import
          emptyDir: {}
        - name: ersatztv-config-pvc
          persistentVolumeClaim:
            claimName: ersatztv-config-pvc
        - name: seedboxmedia-nfs
          persistentVolumeClaim:
            claimName: seedboxmedia-nfs-pvc
        - name: dev-dri
          hostPath:
            path: /dev/dri
            type: Directory
