apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ersatztv
  namespace: tortuga
  annotations:
    kubernetes.io/ingress.class: traefik-tailscale
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: ErsatzTV
    gethomepage.dev/group: Media
    gethomepage.dev/icon: ersatztv
    gethomepage.dev/href: https://ersatztv.${productionClusterFqdn}

spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`ersatztv.${productionClusterFqdn}`)
      kind: Rule
      services:
        - name: ersatztv
          kind: Service
          port: 80
      middlewares:
        - name: authelia
          namespace: authelia
  tls:
    secretName: seedbox-wildcard-backing-secret
