apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sonarr
  namespace: tortuga
  annotations:
    kubernetes.io/ingress.class: traefik-tailscale
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Sonarr
    gethomepage.dev/group: Media
    gethomepage.dev/icon: sonarr
    gethomepage.dev/href: https://sonarr.${productionClusterFqdn}
    # Widget: add gethomepage.dev/widget.key with your Sonarr API key to enable
    gethomepage.dev/widget.type: sonarr
    gethomepage.dev/widget.url: http://sonarr.tortuga
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`sonarr.${productionClusterFqdn}`)
      kind: Rule
      services:
        - name: sonarr
          kind: Service
          port: 80
      middlewares:
        - name: authelia
          namespace: authelia
  tls:
    secretName: seedbox-wildcard-backing-secret
