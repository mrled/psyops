apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: bk2
  namespace: tortuga
  annotations:
    kubernetes.io/ingress.class: traefik-tailscale
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: bk2 (MeTube)
    gethomepage.dev/group: Downloads
    gethomepage.dev/icon: metube
    gethomepage.dev/href: https://bk2.${productionClusterFqdn}
    gethomepage.dev/pod-selector: app.kubernetes.io/name=bk2-metube
    gethomepage.dev/widget.type: metube
    gethomepage.dev/widget.url: http://bk2-metube.tortuga:8081
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`bk2.${productionClusterFqdn}`)
      kind: Rule
      services:
        - name: bk2-metube
          kind: Service
          port: 8081
      middlewares:
        - name: authelia
          namespace: authelia
  tls:
    secretName: seedbox-wildcard-backing-secret
