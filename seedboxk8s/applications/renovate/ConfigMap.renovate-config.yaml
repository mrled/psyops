apiVersion: v1
kind: ConfigMap
metadata:
  name: renovate-config
  namespace: renovate
data:
  config.json: |
    {
      "automerge": false,
      "dependencyDashboard": true,
      "extends": ["config:recommended"],
      "customManagers": [],
      "flux": {
        "managerFilePatterns": [
          "/^seedboxk8s/applications/.+\\.ya?ml$/",
          "/^seedboxk8s/fluxroot/flux-system/gotk-components\\.ya?ml$/",
          "/^seedboxk8s/fluxroot/helmrepos/.+\\.ya?ml$/"
        ]
      },
      "includePaths": ["seedboxk8s/**"],
      "kubernetes": {
        "managerFilePatterns": ["/^seedboxk8s/applications/.+\\.ya?ml$/"]
      },
      "labels": ["renovate"],
      "onboarding": false,
      "packageRules": [
        {
          "matchPackageNames": ["docker.io/library/registry"],
          "changelogUrl": "https://github.com/distribution/distribution/releases"
        },
        {
          "matchPackageNames": ["docker.io/library/traefik"],
          "changelogUrl": "https://github.com/traefik/traefik/releases"
        },
        {
          "matchPackageNames": ["ghcr.io/ersatztv/legacy"],
          "changelogUrl": "https://github.com/ErsatzTV/ErsatzTV/releases"
        },
        {
          "matchPackageNames": ["docker.io/cesanta/docker_auth"],
          "changelogUrl": "https://github.com/cesanta/docker_auth/releases"
        },
        {
          "matchPackageNames": ["ghcr.io/alexta69/metube"],
          "changelogUrl": "https://github.com/alexta69/metube/releases"
        },
        {
          "matchPackageNames": ["ghcr.io/tautulli/tautulli"],
          "changelogUrl": "https://github.com/Tautulli/Tautulli/releases",
          "versioning": "regex:^v(?<major>\\d+)\\.(?<minor>\\d+)\\.(?<patch>\\d+)$"
        },
        {
          "matchPackageNames": ["ghcr.io/linuxserver/cops"],
          "changelogUrl": "https://github.com/linuxserver/docker-cops/releases"
        },
        {
          "matchPackageNames": ["ghcr.io/linuxserver/heimdall"],
          "changelogUrl": "https://github.com/linuxserver/docker-heimdall/releases"
        },
        {
          "matchPackageNames": ["ghcr.io/linuxserver/lazylibrarian"],
          "changelogUrl": "https://github.com/linuxserver/docker-lazylibrarian/releases",
          "versioning": "regex:^[a-f0-9]+-ls(?<major>\\d+)$"
        },
        {
          "matchPackageNames": ["ghcr.io/linuxserver/lidarr"],
          "changelogUrl": "https://github.com/linuxserver/docker-lidarr/releases"
        },
        {
          "matchPackageNames": ["ghcr.io/linuxserver/nzbhydra2"],
          "changelogUrl": "https://github.com/linuxserver/docker-nzbhydra2/releases",
          "versioning": "regex:^v?(?<major>\\d+)\\.(?<minor>\\d+)\\.(?<patch>\\d+)-ls(?<build>\\d+)$"
        },
        {
          "matchPackageNames": ["plexinc/pms-docker"],
          "changelogUrl": "https://github.com/plexinc/pms-docker/releases",
          "versioning": "regex:^(?<major>\\d+)\\.(?<minor>\\d+)\\.(?<patch>\\d+)\\.(?<build>\\d+)-[a-f0-9]+$"
        },
        {
          "matchPackageNames": ["ghcr.io/linuxserver/prowlarr"],
          "changelogUrl": "https://github.com/linuxserver/docker-prowlarr/releases"
        },
        {
          "matchPackageNames": ["ghcr.io/linuxserver/radarr"],
          "changelogUrl": "https://github.com/linuxserver/docker-radarr/releases",
          "versioning": "regex:^(?<major>\\d+)\\.(?<minor>\\d+)\\.(?<patch>\\d+)\\.(?<build>\\d+)-ls(?<revision>\\d+)$"
        },
        {
          "matchPackageNames": ["ghcr.io/linuxserver/sabnzbd"],
          "changelogUrl": "https://github.com/linuxserver/docker-sabnzbd/releases",
          "versioning": "regex:^(?<major>\\d+)\\.(?<minor>\\d+)\\.(?<patch>\\d+)-ls(?<build>\\d+)$"
        },
        {
          "matchPackageNames": ["ghcr.io/linuxserver/sonarr"],
          "changelogUrl": "https://github.com/linuxserver/docker-sonarr/releases",
          "versioning": "regex:^(?<major>\\d+)\\.(?<minor>\\d+)\\.(?<patch>\\d+)\\.(?<build>\\d+)-ls(?<revision>\\d+)$"
        },
        {
          "matchPackageNames": ["quay.io/buildah/stable"],
          "changelogUrl": "https://github.com/containers/buildah/releases"
        }
      ],
      "platform": "github",
      "branchConcurrentLimit": 0,
      "prConcurrentLimit": 0,
      "prHourlyLimit": 0,
      "requireConfig": "optional",
      "repositories": ["mrled/psyops"],
      "timezone": "America/Chicago"
    }

  # Replace certain values before running Renovate.
  # Allows Renovate to support things like x3Image.
  render-config.js: |
    const fs = require("fs");

    const configPath = process.env.RENOVATE_CONFIG_FILE || "/etc/renovate/config.json";
    const outputPath = "/tmp/renovate-config.json";

    function requireEnv(name) {
      const value = process.env[name];
      if (!value) {
        console.error(`${name} is required from the reflected seedboxk8s-config Secret`);
        process.exit(1);
      }
      return value;
    }

    const imageVars = [
      {
        name: "x3Image",
        path: "seedboxk8s/applications/x3/StatefulSet.yaml",
        versioning: "semver",
      },
      {
        name: "shhhImage",
        path: "seedboxk8s/applications/shhh/StatefulSet.yaml",
        versioning: "regex:^v3-(?<major>\\d+)\\.(?<minor>\\d+)\\.(?<patch>\\d+)\\.(?<build>\\d+)$",
      },
    ];

    const config = JSON.parse(fs.readFileSync(configPath, "utf8"));
    config.customManagers = config.customManagers || [];
    for (const imageVar of imageVars) {
      config.customManagers.push({
        customType: "regex",
        managerFilePatterns: [`/^${imageVar.path.replaceAll("/", "\\/").replaceAll(".", "\\.")}$/`],
        matchStrings: [`(?<depPrefix>image:\\s*)\\$\\{${imageVar.name}\\}:(?<currentValue>\\S+)`],
        autoReplaceStringTemplate: `{{{depPrefix}}}\${${imageVar.name}}:{{{newValue}}}`,
        datasourceTemplate: "docker",
        depNameTemplate: requireEnv(imageVar.name),
        versioningTemplate: imageVar.versioning,
        ...(imageVar.extractVersion ? { extractVersionTemplate: imageVar.extractVersion } : {}),
      });
    }

    fs.writeFileSync(outputPath, `${JSON.stringify(config, null, 2)}\n`);

  github-app-token.js: |
    const crypto = require("crypto");
    const https = require("https");

    const appId = process.env.GITHUB_APP_ID;
    const privateKey = process.env.GITHUB_APP_PRIVATE_KEY;
    const repository = process.env.GITHUB_APP_REPOSITORY || "mrled/psyops";

    if (!appId || !privateKey) {
      console.error("GITHUB_APP_ID and GITHUB_APP_PRIVATE_KEY are required");
      process.exit(1);
    }

    function base64url(value) {
      return Buffer.from(value)
        .toString("base64")
        .replace(/=/g, "")
        .replace(/\+/g, "-")
        .replace(/\//g, "_");
    }

    const now = Math.floor(Date.now() / 1000);
    const header = base64url(JSON.stringify({ alg: "RS256", typ: "JWT" }));
    const payload = base64url(JSON.stringify({ iat: now - 60, exp: now + 540, iss: appId }));
    const unsignedJwt = `${header}.${payload}`;
    const signature = crypto.sign("RSA-SHA256", Buffer.from(unsignedJwt), privateKey);
    const jwt = `${unsignedJwt}.${base64url(signature)}`;

    function githubRequest(options, body = "") {
      return new Promise((resolve, reject) => {
        const request = https.request(
          {
            hostname: "api.github.com",
            headers: {
              Accept: "application/vnd.github+json",
              Authorization: `Bearer ${jwt}`,
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "seedboxk8s-renovate",
            },
            ...options,
          },
          (response) => {
            let responseBody = "";
            response.setEncoding("utf8");
            response.on("data", (chunk) => {
              responseBody += chunk;
            });
            response.on("end", () => {
              resolve({ statusCode: response.statusCode, body: responseBody });
            });
          },
        );

        request.on("error", reject);
        request.end(body);
      });
    }

    async function main() {
      const appResponse = await githubRequest({ method: "GET", path: "/app" });
      if (appResponse.statusCode < 200 || appResponse.statusCode > 299) {
        console.error(`GitHub App JWT validation failed with HTTP ${appResponse.statusCode}`);
        console.error("Check that GITHUB_APP_ID matches GITHUB_APP_PRIVATE_KEY.");
        console.error(appResponse.body);
        process.exit(1);
      }

      const [owner, repo] = repository.split("/");
      if (!owner || !repo) {
        console.error(`Invalid GITHUB_APP_REPOSITORY '${repository}', expected owner/repo`);
        process.exit(1);
      }

      const installationResponse = await githubRequest({
        method: "GET",
        path: `/repos/${owner}/${repo}/installation`,
      });
      if (installationResponse.statusCode < 200 || installationResponse.statusCode > 299) {
        console.error(`GitHub App installation lookup failed with HTTP ${installationResponse.statusCode}`);
        console.error(`Check that the app is installed on ${repository}.`);
        console.error(installationResponse.body);
        process.exit(1);
      }

      const installationId = JSON.parse(installationResponse.body).id;
      if (!installationId) {
        console.error(`GitHub installation lookup for ${repository} did not include an installation ID`);
        process.exit(1);
      }

      const tokenResponse = await githubRequest(
      {
        method: "POST",
        path: `/app/installations/${installationId}/access_tokens`,
      });

      if (tokenResponse.statusCode < 200 || tokenResponse.statusCode > 299) {
        console.error(`GitHub installation token request failed with HTTP ${tokenResponse.statusCode}`);
        console.error(tokenResponse.body);
        process.exit(1);
      }

      const token = JSON.parse(tokenResponse.body).token;
      if (!token) {
        console.error("GitHub response did not include an installation token");
        process.exit(1);
      }

      process.stdout.write(token);
    }

    main().catch((error) => {
      console.error(error);
      process.exit(1);
    });
