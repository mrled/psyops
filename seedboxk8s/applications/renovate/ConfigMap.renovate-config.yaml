apiVersion: v1
kind: ConfigMap
metadata:
  name: renovate-config
  namespace: renovate
data:
  config.json: |
    {
      "dependencyDashboard": true,
      "extends": ["config:recommended"],
      "includePaths": ["seedboxk8s/**"],
      "labels": ["renovate"],
      "onboarding": false,
      "platform": "github",
      "requireConfig": "optional",
      "repositories": ["mrled/psyops"],
      "timezone": "America/Chicago"
    }
  github-app-token.js: |
    const crypto = require("crypto");
    const https = require("https");

    const appId = process.env.GITHUB_APP_ID;
    const installationId = process.env.GITHUB_APP_INSTALLATION_ID;
    const privateKey = process.env.GITHUB_APP_PRIVATE_KEY;

    if (!appId || !installationId || !privateKey) {
      console.error("GITHUB_APP_ID, GITHUB_APP_INSTALLATION_ID, and GITHUB_APP_PRIVATE_KEY are required");
      process.exit(1);
    }

    function base64url(value) {
      return Buffer.from(value)
        .toString("base64")
        .replace(/=/g, "")
        .replace(/\+/g, "-")
        .replace(/\//g, "_");
    }

    const now = Math.floor(Date.now() / 1000);
    const header = base64url(JSON.stringify({ alg: "RS256", typ: "JWT" }));
    const payload = base64url(JSON.stringify({ iat: now - 60, exp: now + 540, iss: appId }));
    const unsignedJwt = `${header}.${payload}`;
    const signature = crypto.sign("RSA-SHA256", Buffer.from(unsignedJwt), privateKey);
    const jwt = `${unsignedJwt}.${base64url(signature)}`;

    const request = https.request(
      {
        hostname: "api.github.com",
        method: "POST",
        path: `/app/installations/${installationId}/access_tokens`,
        headers: {
          Accept: "application/vnd.github+json",
          Authorization: `Bearer ${jwt}`,
          "X-GitHub-Api-Version": "2022-11-28",
          "User-Agent": "seedboxk8s-renovate",
        },
      },
      (response) => {
        let body = "";
        response.setEncoding("utf8");
        response.on("data", (chunk) => {
          body += chunk;
        });
        response.on("end", () => {
          if (response.statusCode < 200 || response.statusCode > 299) {
            console.error(`GitHub installation token request failed with HTTP ${response.statusCode}`);
            if (response.statusCode === 404) {
              console.error(
                "Check that GITHUB_APP_INSTALLATION_ID is the installation ID for this app, " +
                  "that GITHUB_APP_ID matches the private key, and that the app is installed on mrled/psyops.",
              );
            }
            console.error(body);
            process.exit(1);
          }

          const token = JSON.parse(body).token;
          if (!token) {
            console.error("GitHub response did not include an installation token");
            process.exit(1);
          }

          process.stdout.write(token);
        });
      },
    );

    request.on("error", (error) => {
      console.error(error);
      process.exit(1);
    });
    request.end();
