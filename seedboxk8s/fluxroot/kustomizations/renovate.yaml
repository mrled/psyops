apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: renovate
  namespace: flux-system
spec:
  interval: 15m
  path: /seedboxk8s/applications/renovate
  prune: true
  timeout: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: fluxcfg
    - name: reflector
  decryption:
    provider: sops
    secretRef:
      name: sops-age
