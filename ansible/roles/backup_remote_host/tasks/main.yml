---
- name: Fix homedir permissions
  # SSH won't accept key auth if homedir is world/group writable, which it is by default on Synology
  ansible.builtin.file:
    path: "{{ lookup('env', 'HOME') }}"
    mode: "0700"
    state: directory
  when: acmedns_remote_host_fix_homedir_permissions|bool

- name: Install SSH key
  ansible.posix.authorized_key:
    user: "{{ backup_remote_host_user }}"
    state: present
    key: "{{ backup_remote_host_ssh_client_pubkey }}"

- name: Allow passwordless sudo
  ansible.builtin.copy:
    content: |
      {{ backup_remote_host_user }} ALL=(ALL) NOPASSWD: ALL
    dest: /etc/sudoers.d/{{ backup_remote_host_user }}_passwordless
    owner: root
    group: root
    mode: "0600"
  when: backup_remote_host_allow_passwordless_sudo|bool
