---
# List of block device paths to decrypt, e.g. [/dev/sdb, /dev/sdc]
seedbox_storage_media_disks: []

# LUKS passphrase for all media disks
seedbox_storage_luks_password: ""

# LVM volume group to activate after decrypting disks
seedbox_storage_volume_group: seedbox

# Logical volume name within the volume group to mount
seedbox_storage_media_lv: media

# Mount point and symlink for the media volume
seedbox_storage_media_mount: /mnt/seedboxmedia
seedbox_storage_media_symlink: /seedboxmedia
