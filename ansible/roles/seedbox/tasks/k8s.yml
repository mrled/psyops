---
# Install k0s single-node Kubernetes cluster and bootstrap Flux.
# Translated from progfiguration_blacksite roles/seedboxk8s/__init__.py

- name: Install k8s prerequisites
  ansible.builtin.apt:
    name:
      - nfs-kernel-server
      - rpcbind
      - curl
    state: present

- name: Enable and start NFS services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: started
    enabled: true
  with_items:
    - nfs-kernel-server
    - rpcbind

- name: Install NFS exports
  ansible.builtin.template:
    src: nfs_exports.j2
    dest: /etc/exports
    owner: root
    group: root
    mode: "0644"

# Always apply exports -- don't rely on a handler, since on fresh install
# the NFS server may have started before /etc/exports was written.
- name: Apply NFS exports
  ansible.builtin.command: exportfs -ra
- name: Install cluster CA certificate
  ansible.builtin.copy:
    content: "{{ seedbox_k8s_ca_crt }}"
    dest: /usr/local/share/ca-certificates/seedboxk8s.ca.crt
    owner: root
    group: root
    mode: "0644"
  notify: update ca certificates

# Flush handlers early so CA cert update happens before k0s uses it
- name: Flush handlers (update CA certs before k0s)
  ansible.builtin.meta: flush_handlers
- name: Create k0s config directory
  ansible.builtin.file:
    path: /etc/k0s
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Install k0s config
  ansible.builtin.template:
    src: k0s.yaml.j2
    dest: /etc/k0s/k0s.yaml
    owner: root
    group: root
    mode: "0640"
  register: seedbox_k0s_yaml_result

# Install k0s binary
- name: Check current k0s version
  ansible.builtin.command: /usr/local/bin/k0s version
  register: seedbox_k0s_version_check
  changed_when: false
  failed_when: false

- name: Download and install k0s binary
  ansible.builtin.get_url:
    url: "https://github.com/k0sproject/k0s/releases/download/{{ seedbox_k8s_k0s_version }}/k0s-{{ seedbox_k8s_k0s_version | replace('+', '%2B') }}-amd64"
    dest: /usr/local/bin/k0s
    owner: root
    group: root
    mode: "0755"
  when: seedbox_k0s_version_check.rc != 0 or seedbox_k8s_k0s_version not in seedbox_k0s_version_check.stdout

# Install helm
- name: Check current helm version
  ansible.builtin.command: /usr/local/bin/helm version --short
  register: seedbox_helm_version_check
  changed_when: false
  failed_when: false

- name: Download helm tarball
  ansible.builtin.get_url:
    url: "https://get.helm.sh/helm-{{ seedbox_k8s_helm_version }}-linux-amd64.tar.gz"
    dest: "/tmp/helm-{{ seedbox_k8s_helm_version }}.tar.gz"
  when: seedbox_helm_version_check.rc != 0 or seedbox_k8s_helm_version not in seedbox_helm_version_check.stdout
  register: seedbox_helm_tarball

- name: Extract helm binary
  ansible.builtin.unarchive:
    src: "/tmp/helm-{{ seedbox_k8s_helm_version }}.tar.gz"
    dest: /tmp/
    remote_src: true
  when: seedbox_helm_tarball is changed

- name: Install helm binary
  ansible.builtin.copy:
    src: /tmp/linux-amd64/helm
    dest: /usr/local/bin/helm
    owner: root
    group: root
    mode: "0755"
    remote_src: true
  when: seedbox_helm_tarball is changed

# Install kubeseal
- name: Check current kubeseal version
  ansible.builtin.command: /usr/local/bin/kubeseal --version
  register: seedbox_kubeseal_version_check
  changed_when: false
  failed_when: false

- name: Download kubeseal tarball
  ansible.builtin.get_url:
    url: "https://github.com/bitnami-labs/sealed-secrets/releases/download/v{{ seedbox_k8s_kubeseal_version }}/kubeseal-{{ seedbox_k8s_kubeseal_version }}-linux-amd64.tar.gz"
    dest: "/tmp/kubeseal-{{ seedbox_k8s_kubeseal_version }}.tar.gz"
  when: seedbox_kubeseal_version_check.rc != 0 or seedbox_k8s_kubeseal_version not in seedbox_kubeseal_version_check.stdout
  register: seedbox_kubeseal_tarball

- name: Extract and install kubeseal binary
  ansible.builtin.unarchive:
    src: "/tmp/kubeseal-{{ seedbox_k8s_kubeseal_version }}.tar.gz"
    dest: /usr/local/bin/
    remote_src: true
    include:
      - kubeseal
  when: seedbox_kubeseal_tarball is changed

- name: Ensure kubeseal is executable
  ansible.builtin.file:
    path: /usr/local/bin/kubeseal
    owner: root
    group: root
    mode: "0755"
  when: seedbox_kubeseal_tarball is changed

# Install flux
- name: Check current flux version
  ansible.builtin.command: /usr/local/bin/flux version --client
  register: seedbox_flux_version_check
  changed_when: false
  failed_when: false

- name: Download flux tarball
  ansible.builtin.get_url:
    url: "https://github.com/fluxcd/flux2/releases/download/v{{ seedbox_k8s_flux_version }}/flux_{{ seedbox_k8s_flux_version }}_linux_amd64.tar.gz"
    dest: "/tmp/flux-{{ seedbox_k8s_flux_version }}.tar.gz"
  when: seedbox_flux_version_check.rc != 0 or seedbox_k8s_flux_version not in seedbox_flux_version_check.stdout
  register: seedbox_flux_tarball

- name: Extract and install flux binary
  ansible.builtin.unarchive:
    src: "/tmp/flux-{{ seedbox_k8s_flux_version }}.tar.gz"
    dest: /usr/local/bin/
    remote_src: true
    include:
      - flux
  when: seedbox_flux_tarball is changed

- name: Ensure flux is executable
  ansible.builtin.file:
    path: /usr/local/bin/flux
    owner: root
    group: root
    mode: "0755"
  when: seedbox_flux_tarball is changed

# Set up k0s shell aliases
- name: Install k0s profile.d aliases
  ansible.builtin.copy:
    dest: /etc/profile.d/k0s.sh
    content: |
      #!/bin/sh
      alias kubectl="/usr/local/bin/k0s kubectl"
      alias k="/usr/local/bin/k0s kubectl"
    owner: root
    group: root
    mode: "0644"

# Store Flux and CA secrets
- name: Create /etc/seedboxk8s directory
  ansible.builtin.file:
    path: /etc/seedboxk8s
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Create /etc/seedboxk8s/flux directory
  ansible.builtin.file:
    path: /etc/seedboxk8s/flux
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Install Flux GitHub deploy key
  ansible.builtin.copy:
    content: "{{ seedbox_k8s_flux_deploy_id }}"
    dest: /etc/seedboxk8s/flux/psyops_seedboxk8s_flux_deploy_id
    owner: root
    group: root
    mode: "0600"

- name: Install Flux age key (for SOPS)
  ansible.builtin.copy:
    content: "{{ seedbox_k8s_flux_agekey }}"
    dest: /etc/seedboxk8s/flux.agekey
    owner: root
    group: root
    mode: "0600"

# Set up k0s controller service
# Translated from progfiguration: if the service file doesn't exist, install it;
# if the config changed (and service already existed), restart it; always start it.
- name: Install k0s controller service
  ansible.builtin.command: /usr/local/bin/k0s install controller --single -c /etc/k0s/k0s.yaml
  args:
    creates: /etc/systemd/system/k0scontroller.service
  register: seedbox_k0s_service_install_result

- name: Restart k0scontroller if config changed (service was pre-existing)
  ansible.builtin.systemd:
    name: k0scontroller
    state: restarted
  when: seedbox_k0s_yaml_result is changed and not seedbox_k0s_service_install_result is changed

- name: Start k0scontroller
  ansible.builtin.systemd:
    name: k0scontroller
    state: started
    enabled: true

# Set up kubeconfig for root
- name: Create /root/.kube directory
  ansible.builtin.file:
    path: /root/.kube
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Generate admin kubeconfig
  ansible.builtin.shell: /usr/local/bin/k0s kubeconfig admin > /root/.kube/config
  args:
    creates: /root/.kube/config

- name: Ensure kubeconfig is mode 0600
  ansible.builtin.file:
    path: /root/.kube/config
    owner: root
    group: root
    mode: "0600"

# Bootstrap Flux
- name: Check if flux-system namespace exists
  ansible.builtin.command: /usr/local/bin/k0s kubectl get ns flux-system
  register: seedbox_flux_ns_check
  changed_when: false
  failed_when: false

- name: Bootstrap Flux from psyops repo
  ansible.builtin.command: >
    /usr/local/bin/flux bootstrap git
    --url=ssh://git@github.com/mrled/psyops
    --path=seedboxk8s/fluxroot
    --branch=master
    --private-key-file=/etc/seedboxk8s/flux/psyops_seedboxk8s_flux_deploy_id
    --silent
  when: seedbox_flux_ns_check.rc != 0

# Create SOPS age secret for Flux
- name: Check if sops-age secret exists
  ansible.builtin.command: /usr/local/bin/k0s kubectl get secret sops-age --namespace=flux-system
  register: seedbox_sops_age_check
  changed_when: false
  failed_when: false

- name: Create sops-age secret for Flux
  ansible.builtin.command: >
    /usr/local/bin/k0s kubectl create secret generic sops-age
    --namespace=flux-system
    --from-file=/etc/seedboxk8s/flux.agekey
  when: seedbox_sops_age_check.rc != 0
