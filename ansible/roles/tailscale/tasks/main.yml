---
- name: Install Tailscale on Debian/Ubuntu
  when: ansible_distribution in ["Debian", "Ubuntu"]

  block:
    - name: Get GPG key
      ansible.builtin.get_url:
        url: https://pkgs.tailscale.com/stable/{{ ansible_distribution | lower }}/{{ ansible_distribution_release }}.noarmor.gpg
        dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
        owner: root
        mode: "0644"
    - name: Get sources.list
      ansible.builtin.get_url:
        url: https://pkgs.tailscale.com/stable/{{ ansible_distribution | lower }}/{{ ansible_distribution_release }}.tailscale-keyring.list
        dest: /etc/apt/sources.list.d/tailscale.list
        owner: root
        mode: "0644"
    - name: Install tailscale
      ansible.builtin.apt:
        update_cache: true
        name: tailscale
        state: latest
- ansible.builtin.debug:
    var: ansible_distribution
- name: Install Tailscale on RH
  when: ansible_distribution in ["Rocky", "Fedora"]

  block:
  # Rocky Linux is basically CentOS, but still supported.
  # Tailscale doesn't support it by name, so we'll just swap it out here.
  # Fedora uses a different URL pattern (no version subdir).
    - name: Set repo URL
      ansible.builtin.set_fact:
        tailscale_repo_url: >-
          {{
            'https://pkgs.tailscale.com/stable/fedora/tailscale.repo'
            if ansible_distribution | lower == 'fedora'
            else 'https://pkgs.tailscale.com/stable/' + ('centos' if ansible_distribution == 'Rocky' else ansible_distribution | lower) + '/' + ansible_distribution_major_version
          + '/tailscale.repo'
          }}
    - name: Get repo file
      ansible.builtin.get_url:
        url: "{{ tailscale_repo_url }}"
        dest: /etc/yum.repos.d/tailscale.repo
        owner: root
        mode: "0644"
    - name: Install tailscale
      ansible.builtin.dnf:
        update_cache: true
        name: tailscale
        state: latest
- name: Start and enable tailscale service
  ansible.builtin.systemd:
    name: tailscaled
    state: started
    enabled: true

- name: Read tailscaled.state
  ansible.builtin.slurp:
    src: /var/lib/tailscale/tailscaled.state
  register: tailscale_daemon_state

- name: When machine is already joined to the tailnet
  when: "'_machinekey' in (tailscale_daemon_state['content'] | b64decode)"

  block:
    - ansible.builtin.debug:
        msg: This machine is already joined to the tailnet
- name: When the machine is not joined to the tailnet
  when: "'_machinekey' not in (tailscale_daemon_state['content'] | b64decode)"

  block:
    - name: When the auth key is defined
      when: tailscale_auth_key is defined
      block:
        - name: Connect to the tailnet via an auth key
          ansible.builtin.command: tailscale up --authkey {{ tailscale_auth_key }}
        - ansible.builtin.debug:
            msg: Joined this machine to the tailnet via auth key
    - name: When the auth key is not defined
      when: tailscale_auth_key is not defined
      block:
        - ansible.builtin.debug:
            msg: >
              This machine is not joined to the tailnet.
              We couldn't join it automatically without an auth key.
- name: Configure SSH takeover
  ansible.builtin.import_tasks: ssh_takeover.yml
  when: tailscale_take_over_ssh

- name: Configure Tailscale Funnel entries
  ansible.builtin.import_tasks: funnel.yml
  when: tailscale_funnels | length > 0
