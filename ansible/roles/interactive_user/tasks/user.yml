---
- name: Getent for user home
  ansible.builtin.getent:
    database: passwd
    key: "{{ interactive_user.name }}"

- name: Set home fact
  ansible.builtin.set_fact:
    interactive_user_home: "{{ getent_passwd[interactive_user.name][4] }}"

- name: Clone dhd repo # noqa: latest
  become: true
  become_user: "{{ interactive_user.name }}"
  ansible.builtin.git:
    repo: https://github.com/mrled/dhd
    dest: "{{ interactive_user_home }}/.dhd"
    update: true
  when: not interactive_user_disable_dhd

- name: Symlink dotfiles from dhd
  become: true
  become_user: "{{ interactive_user.name }}"
  ansible.builtin.file:
    src: "{{ interactive_user_home }}/.dhd/hbase/{{ item }}"
    dest: "{{ interactive_user_home }}/{{ item }}"
    state: link
    force: true
  loop:
    - .bashrc
    - .inputrc
    - .profile
    - .tmux.conf
    - .vimrc
    - .zshrc
  when: not interactive_user_disable_dhd
