---
- name: Add Gitea SSH host key to system known_hosts
  ansible.builtin.shell: |
    if ssh-keygen -F '[{{ chineseroom_gitea_domain }}]:{{ chineseroom_gitea_ssh_port }}' \
         -f /etc/ssh/ssh_known_hosts > /dev/null 2>&1; then
      echo already_present
    else
      ssh-keyscan -p {{ chineseroom_gitea_ssh_port }} {{ chineseroom_gitea_domain }} \
        >> /etc/ssh/ssh_known_hosts
      echo added
    fi
  register: chineseroom_gitea_known_hosts_result
  changed_when: "'added' in chineseroom_gitea_known_hosts_result.stdout"

- name: Add GitHub SSH host keys to system known_hosts
  ansible.builtin.known_hosts:
    path: /etc/ssh/ssh_known_hosts
    name: github.com
    key: "{{ item }}"
    state: present
  loop: "{{ chineseroom_gitea_github_ssh_host_fingerprints }}"

- name: Symlink ~/work to /mnt/aiworkspace for restricted user
  ansible.builtin.file:
    src: /mnt/aiworkspace
    dest: "/home/{{ chineseroom_restricted_user }}/work"
    state: link
  become: true
  become_user: "{{ chineseroom_restricted_user }}"

- name: Get Tailscale status for funnel URL
  ansible.builtin.command: tailscale status --json
  register: chineseroom_gitea_ts_status_raw
  changed_when: false
  when: chineseroom_gitea_github_webhook_secret != ""

- name: Set Tailscale DNS name fact
  ansible.builtin.set_fact:
    chineseroom_gitea_ts_dns_name: >-
      {{ (chineseroom_gitea_ts_status_raw.stdout | from_json).Self.DNSName | regex_replace('\.$', '') }}
  when: chineseroom_gitea_github_webhook_secret != ""

- name: Set Tailscale funnel URL fact
  ansible.builtin.set_fact:
    chineseroom_gitea_ts_funnel_url: "https://{{ chineseroom_gitea_ts_dns_name }}:{{ chineseroom_gitea_funnel_port }}"
  when: chineseroom_gitea_github_webhook_secret != ""

- name: Set up GitHub mirror repos
  ansible.builtin.include_tasks: github_mirror_repo.yml
  loop: "{{ chineseroom_gitea_github_mirrors }}"
  loop_control:
    loop_var: chineseroom_gitea_github_mirror
