---
- name: Create and configure Gitea system user
  import_tasks: user.yml
  tags:
    - chineseroom_gitea_user

- name: Install and configure Gitea
  import_tasks: gitea.yml
  tags:
    - chineseroom_gitea_app

- name: Configure nginx reverse proxy for Gitea
  import_tasks: nginx.yml
  tags:
    - chineseroom_gitea_nginx

- name: Configure GitHub sync webhook receiver
  import_tasks: webhook.yml
  tags:
    - chineseroom_gitea_webhook

- name: Configure periodic GitHub→Gitea pull sync
  import_tasks: sync.yml
  tags:
    - chineseroom_gitea_sync

- name: Create Gitea application users
  import_tasks: gitea_users.yml
  tags:
    - chineseroom_gitea_users

- name: Create mirror org and teams
  import_tasks: gitea_mirror_org.yml
  tags:
    - chineseroom_gitea_mirror_org

- name: Assign users to org teams
  include_tasks: gitea_user_teams.yml
  loop: "{{ chineseroom_gitea_users | selectattr('orgs', 'defined') | list }}"
  loop_control:
    loop_var: _gitea_user_for_teams
    label: "{{ _gitea_user_for_teams.username }}"
  tags:
    - chineseroom_gitea_users

- name: Set up GitHub mirror repos
  import_tasks: github_mirrors.yml
  tags:
    - chineseroom_gitea_github_mirrors
  when: chineseroom_gitea_github_mirrors | length > 0

- name: Write sandbox domain map for Gitea-managed repos
  import_tasks: domainmap.yml
  tags:
    - chineseroom_gitea_github_mirrors

- name: Set up per-repo mirror working clones
  import_tasks: mirrors.yml
  tags:
    - chineseroom_gitea_mirrors
