---
- name: Create gitea group
  ansible.builtin.group:
    name: "{{ chineseroom_gitea_group }}"
    system: true

- name: Create gitea user
  ansible.builtin.user:
    name: "{{ chineseroom_gitea_user }}"
    group: "{{ chineseroom_gitea_group }}"
    home: "{{ chineseroom_gitea_home }}"
    shell: /sbin/nologin
    system: true
    create_home: true

- name: Create SSH directory
  ansible.builtin.file:
    path: "{{ chineseroom_gitea_home }}/.ssh"
    state: directory
    owner: "{{ chineseroom_gitea_user }}"
    group: "{{ chineseroom_gitea_group }}"
    mode: "0700"

- name: Install GitHub SSH private key
  ansible.builtin.copy:
    content: "{{ chineseroom_gitea_github_ssh_privkey }}"
    dest: "{{ chineseroom_gitea_home }}/.ssh/id_ed25519"
    owner: "{{ chineseroom_gitea_user }}"
    group: "{{ chineseroom_gitea_group }}"
    mode: "0600"
  no_log: true

- name: Derive GitHub SSH public key from private key
  ansible.builtin.command: ssh-keygen -y -f {{ chineseroom_gitea_home }}/.ssh/id_ed25519
  register: chineseroom_gitea_derived_pubkey
  changed_when: false

- name: Install derived GitHub SSH public key
  ansible.builtin.copy:
    content: "{{ chineseroom_gitea_derived_pubkey.stdout }}\n"
    dest: "{{ chineseroom_gitea_home }}/.ssh/id_ed25519.pub"
    owner: "{{ chineseroom_gitea_user }}"
    group: "{{ chineseroom_gitea_group }}"
    mode: "0644"

- name: Install SSH config for GitHub
  ansible.builtin.template:
    src: ssh_config.j2
    dest: "{{ chineseroom_gitea_home }}/.ssh/config"
    owner: "{{ chineseroom_gitea_user }}"
    group: "{{ chineseroom_gitea_group }}"
    mode: "0600"
