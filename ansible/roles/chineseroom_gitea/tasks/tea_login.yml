---
- name: Ensure .ssh directory exists for restricted user
  file:
    path: "/home/{{ chineseroom_gitea_restricted_user }}/.ssh"
    state: directory
    owner: "{{ chineseroom_gitea_restricted_user }}"
    group: "{{ chineseroom_gitea_restricted_user }}"
    mode: "0700"

- name: Install SSH private keys for restricted user
  copy:
    content: "{{ item.content }}"
    dest: "/home/{{ chineseroom_gitea_restricted_user }}/.ssh/{{ item.filename }}"
    owner: "{{ chineseroom_gitea_restricted_user }}"
    group: "{{ chineseroom_gitea_restricted_user }}"
    mode: "0600"
  no_log: yes
  loop: "{{ chineseroom_gitea_restricted_user_privkeys }}"

- name: Install tea CLI via Homebrew
  become: yes
  become_user: "{{ chineseroom_gitea_restricted_user }}"
  command: /home/linuxbrew/.linuxbrew/bin/brew install tea
  environment:
    HOME: /home/linuxbrew
  register: _tea_brew_install
  changed_when: "'already installed' not in _tea_brew_install.stdout"

- name: Check existing tea logins for restricted user
  become: yes
  become_user: "{{ chineseroom_gitea_restricted_user }}"
  command: /home/linuxbrew/.linuxbrew/bin/tea logins ls --output json
  register: _tea_logins_list
  changed_when: false

- name: Configure tea login for restricted user
  become: yes
  become_user: "{{ chineseroom_gitea_restricted_user }}"
  command: >-
    /home/linuxbrew/.linuxbrew/bin/tea login add
    --name {{ chineseroom_gitea_server_shortname if chineseroom_gitea_server_shortname else chineseroom_gitea_domain }}
    --url https://{{ chineseroom_gitea_domain }}
    --token {{ chineseroom_gitea_restricted_user_token }}
  no_log: yes
  vars:
    _login_name: "{{ chineseroom_gitea_server_shortname if chineseroom_gitea_server_shortname else chineseroom_gitea_domain }}"
  when: >-
    ((_tea_logins_list.stdout | from_json) or []) | selectattr('name', 'equalto', _login_name) | list | length == 0

- name: Set tea default login for restricted user
  become: yes
  become_user: "{{ chineseroom_gitea_restricted_user }}"
  command: >-
    /home/linuxbrew/.linuxbrew/bin/tea logins default
    {{ chineseroom_gitea_server_shortname if chineseroom_gitea_server_shortname else chineseroom_gitea_domain }}
  changed_when: false
