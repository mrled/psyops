---
- name: Install git and git-lfs
  package:
    name:
      - git
      - git-lfs
    state: present

- name: Check if Gitea binary already exists
  stat:
    path: "{{ chineseroom_gitea_binary_versioned }}"
  register: chineseroom_gitea_binary_stat

- name: Download Gitea binary
  get_url:
    url: "{{ chineseroom_gitea_dl_url }}"
    dest: "{{ chineseroom_gitea_binary_versioned }}"
    mode: "0755"
    owner: root
    group: root
  when: not chineseroom_gitea_binary_stat.stat.exists
  notify: restart gitea

- name: Symlink Gitea binary to /usr/local/bin/gitea
  file:
    src: "{{ chineseroom_gitea_binary_versioned }}"
    dest: "{{ chineseroom_gitea_binary }}"
    state: link
  notify: restart gitea

- name: Create Gitea config directory
  file:
    path: "{{ chineseroom_gitea_config_dir }}"
    state: directory
    owner: root
    group: "{{ chineseroom_gitea_group }}"
    mode: "0750"

- name: Create Gitea data directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ chineseroom_gitea_user }}"
    group: "{{ chineseroom_gitea_group }}"
    mode: "0750"
  loop:
    - "{{ chineseroom_gitea_data_dir }}"
    - "{{ chineseroom_gitea_repos_dir }}"
    - "{{ chineseroom_gitea_lfs_dir }}"
    - "{{ chineseroom_gitea_mirrors_dir }}"
    - "{{ chineseroom_gitea_log_dir }}"

- name: Create sync helper library directory
  file:
    path: "{{ chineseroom_gitea_sync_lib_dir }}"
    state: directory
    owner: root
    group: "{{ chineseroom_gitea_group }}"
    mode: "0750"

- name: Install Gitea app.ini
  template:
    src: app.ini.j2
    dest: "{{ chineseroom_gitea_config_dir }}/app.ini"
    owner: "{{ chineseroom_gitea_user }}"
    group: "{{ chineseroom_gitea_group }}"
    mode: "0660"
    backup: yes
  no_log: yes
  notify: restart gitea

- name: Install Gitea systemd service
  template:
    src: gitea.service.j2
    dest: /etc/systemd/system/gitea.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - daemon-reload
    - restart gitea

- name: Open Gitea HTTP port in firewall
  firewalld:
    port: "{{ chineseroom_gitea_http_port }}/tcp"
    zone: public
    permanent: yes
    state: enabled
    immediate: yes
  when: chineseroom_firewall_enabled

- name: Open Gitea SSH port in firewall
  firewalld:
    port: "{{ chineseroom_gitea_ssh_port }}/tcp"
    zone: public
    permanent: yes
    state: enabled
    immediate: yes
  when: chineseroom_firewall_enabled

- name: Enable and start Gitea
  systemd:
    name: gitea
    enabled: yes
    state: started
    daemon_reload: yes

- name: Install tea CLI via Linuxbrew
  community.general.homebrew:
    name: tea
    path: /home/linuxbrew/.linuxbrew/bin
    state: latest
  become: yes
  become_user: "{{ chineseroom_restricted_user }}"
