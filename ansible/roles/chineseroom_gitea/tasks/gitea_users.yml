---
- name: List existing Gitea users
  ansible.builtin.command: "{{ chineseroom_gitea_binary }} admin user list --config {{ chineseroom_gitea_config_dir }}/app.ini"
  become: true
  become_user: "{{ chineseroom_gitea_user }}"
  environment:
    GITEA_WORK_DIR: "{{ chineseroom_gitea_home }}"
  register: chineseroom_gitea_user_list
  changed_when: false
  failed_when: false

- name: Generate admin password
  ansible.builtin.shell: openssl rand -hex 32 > {{ chineseroom_gitea_admin_password_file }}
  become: true
  become_user: "{{ chineseroom_gitea_user }}"
  args:
    creates: "{{ chineseroom_gitea_admin_password_file }}"

- name: Read admin password
  ansible.builtin.slurp:
    src: "{{ chineseroom_gitea_admin_password_file }}"
  register: chineseroom_gitea_admin_password_slurped

- name: Create Gitea admin user for Ansible API operations
  ansible.builtin.command: >-
    {{ chineseroom_gitea_binary }} admin user create
    --username {{ chineseroom_gitea_admin_username }}
    --password {{ chineseroom_gitea_admin_password_slurped.content | b64decode | trim }}
    --email {{ chineseroom_gitea_admin_email }}
    --admin
    --must-change-password=false
    --config {{ chineseroom_gitea_config_dir }}/app.ini
  become: true
  become_user: "{{ chineseroom_gitea_user }}"
  environment:
    GITEA_WORK_DIR: "{{ chineseroom_gitea_home }}"
  when: chineseroom_gitea_admin_username not in chineseroom_gitea_user_list.stdout
  no_log: true
  changed_when: true

- name: Generate Ansible admin API token
  ansible.builtin.shell: >-
    {{ chineseroom_gitea_binary }} admin user generate-access-token
    --username {{ chineseroom_gitea_admin_username }}
    --token-name ansible-admin
    --raw
    --scopes all
    --config {{ chineseroom_gitea_config_dir }}/app.ini
    > {{ chineseroom_gitea_admin_token_file }}
  become: true
  become_user: "{{ chineseroom_gitea_user }}"
  environment:
    GITEA_WORK_DIR: "{{ chineseroom_gitea_home }}"
  args:
    creates: "{{ chineseroom_gitea_admin_token_file }}"

- name: Read Ansible admin API token
  ansible.builtin.slurp:
    src: "{{ chineseroom_gitea_admin_token_file }}"
  register: chineseroom_gitea_admin_token_slurped

- name: Set admin token fact
  ansible.builtin.set_fact:
    chineseroom_gitea_admin_token: "{{ chineseroom_gitea_admin_token_slurped.content | b64decode | trim }}"

- name: Generate mirrorbot password
  ansible.builtin.shell: openssl rand -hex 32 > {{ chineseroom_gitea_mirror_password_file }}
  become: true
  become_user: "{{ chineseroom_gitea_user }}"
  args:
    creates: "{{ chineseroom_gitea_mirror_password_file }}"

- name: Read mirrorbot password
  ansible.builtin.slurp:
    src: "{{ chineseroom_gitea_mirror_password_file }}"
  register: chineseroom_gitea_mirror_password_slurped

- name: Create mirrorbot user
  ansible.builtin.command: >-
    {{ chineseroom_gitea_binary }} admin user create
    --username {{ chineseroom_gitea_mirror_user }}
    --password {{ chineseroom_gitea_mirror_password_slurped.content | b64decode | trim }}
    --must-change-password=false
    --email {{ chineseroom_gitea_mirror_email }}
    --config {{ chineseroom_gitea_config_dir }}/app.ini
  become: true
  become_user: "{{ chineseroom_gitea_user }}"
  environment:
    GITEA_WORK_DIR: "{{ chineseroom_gitea_home }}"
  when: chineseroom_gitea_mirror_user not in chineseroom_gitea_user_list.stdout
  no_log: true
  changed_when: true

- name: Generate mirrorbot API token
  ansible.builtin.shell: >-
    {{ chineseroom_gitea_binary }} admin user generate-access-token
    --username {{ chineseroom_gitea_mirror_user }}
    --token-name mirrorbot
    --raw
    --scopes all
    --config {{ chineseroom_gitea_config_dir }}/app.ini
    > {{ chineseroom_gitea_mirror_token_file }}
  become: true
  become_user: "{{ chineseroom_gitea_user }}"
  environment:
    GITEA_WORK_DIR: "{{ chineseroom_gitea_home }}"
  args:
    creates: "{{ chineseroom_gitea_mirror_token_file }}"

- name: Read mirrorbot API token
  ansible.builtin.slurp:
    src: "{{ chineseroom_gitea_mirror_token_file }}"
  register: chineseroom_gitea_mirror_token_slurped

- name: Set mirrorbot token fact
  ansible.builtin.set_fact:
    chineseroom_gitea_mirror_token: "{{ chineseroom_gitea_mirror_token_slurped.content | b64decode | trim }}"

- name: Create Gitea users
  ansible.builtin.command: >-
    {{ chineseroom_gitea_binary }} admin user create
    --username {{ item.username }}
    --password {{ item.password }}
    --email {{ item.email }}
    --must-change-password=false
    {{ '--admin' if item.admin | default(false) else '' }}
    --config {{ chineseroom_gitea_config_dir }}/app.ini
  become: true
  become_user: "{{ chineseroom_gitea_user }}"
  environment:
    GITEA_WORK_DIR: "{{ chineseroom_gitea_home }}"
  when: item.username not in chineseroom_gitea_user_list.stdout
  no_log: true
  loop: "{{ chineseroom_gitea_users }}"
  changed_when: true

- name: Add SSH keys to Gitea users
  ansible.builtin.include_tasks: gitea_user_ssh_keys.yml
  loop: "{{ chineseroom_gitea_users | selectattr('ssh_keys', 'defined') | list }}"
  loop_control:
    loop_var: gitea_user

- name: Create gitea token directory for restricted user
  ansible.builtin.file:
    path: "{{ chineseroom_gitea_restricted_user_token_dir }}"
    state: directory
    owner: "{{ chineseroom_restricted_user }}"
    group: "{{ chineseroom_restricted_user }}"
    mode: "0750"

- name: Check if restricted user token file exists
  ansible.builtin.stat:
    path: "{{ chineseroom_gitea_restricted_user_token_file }}"
  register: chineseroom_gitea_restricted_user_token_stat

- name: Generate restricted user API token for tea CLI
  ansible.builtin.command: >-
    {{ chineseroom_gitea_binary }} admin user generate-access-token
    --username {{ chineseroom_restricted_user }}
    --token-name tea-cli
    --raw
    --scopes all
    --config {{ chineseroom_gitea_config_dir }}/app.ini
  become: true
  become_user: "{{ chineseroom_gitea_user }}"
  environment:
    GITEA_WORK_DIR: "{{ chineseroom_gitea_home }}"
  register: chineseroom_gitea_restricted_user_token_generated
  when: not chineseroom_gitea_restricted_user_token_stat.stat.exists
  changed_when: true

- name: Write restricted user token file with correct ownership
  ansible.builtin.copy:
    content: "{{ chineseroom_gitea_restricted_user_token_generated.stdout }}"
    dest: "{{ chineseroom_gitea_restricted_user_token_file }}"
    owner: root
    group: "{{ chineseroom_restricted_user }}"
    mode: "0640"
  when: not chineseroom_gitea_restricted_user_token_stat.stat.exists
  no_log: true

- name: Read restricted user API token
  ansible.builtin.slurp:
    src: "{{ chineseroom_gitea_restricted_user_token_file }}"
  register: chineseroom_gitea_restricted_user_token_slurped

- name: Set restricted user token fact
  ansible.builtin.set_fact:
    chineseroom_gitea_restricted_user_token: "{{ chineseroom_gitea_restricted_user_token_slurped.content | b64decode | trim }}"
