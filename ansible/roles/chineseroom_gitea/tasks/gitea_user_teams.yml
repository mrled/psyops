---
# Called once per user entry that has orgs defined.
# Loop var: _gitea_user_for_teams
#
# orgs format in chineseroom_gitea_users (dict of org → team list):
#   orgs:
#     mirror: [trusted]
#     someorg: [team1, team2]

- name: Get teams for orgs that {{ _gitea_user_for_teams.username }} is assigned to
  uri:
    url: "https://{{ chineseroom_gitea_domain }}/api/v1/orgs/{{ item.key }}/teams"
    headers:
      Authorization: "token {{ chineseroom_gitea_admin_token }}"
    method: GET
    status_code: 200
  register: _user_org_teams_results
  loop: "{{ _gitea_user_for_teams.orgs | dict2items }}"
  loop_control:
    label: "{{ item.key }}"

- name: Build flat team-assignment list for {{ _gitea_user_for_teams.username }}
  vars:
    _raw: >-
      {% set assignments = [] %}
      {% for result in _user_org_teams_results.results %}
      {%   for team_name in result.item.value %}
      {%     set team_obj = result.json | selectattr('name', 'equalto', team_name) | list | first | default(none) %}
      {%     if team_obj %}
      {%       set _ = assignments.append({'team_id': team_obj.id, 'team_name': team_name, 'org': result.item.key}) %}
      {%     endif %}
      {%   endfor %}
      {% endfor %}
      {{ assignments }}
  set_fact:
    _user_team_assignments: "{{ _raw | from_yaml }}"

- name: Show team assignments for {{ _gitea_user_for_teams.username }}
  debug:
    var: _user_team_assignments

- name: Add {{ _gitea_user_for_teams.username }} to org teams
  uri:
    url: "https://{{ chineseroom_gitea_domain }}/api/v1/teams/{{ item.team_id }}/members/{{ _gitea_user_for_teams.username }}"
    headers:
      Authorization: "token {{ chineseroom_gitea_admin_token }}"
    method: PUT
    status_code: [200, 204]
  loop: "{{ _user_team_assignments }}"
  loop_control:
    label: "{{ item.org }}/{{ item.team_name }}"
