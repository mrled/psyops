---
# Create the mirror org, its three teams, and add mirrorbot to the admin team.
# Depends on: chineseroom_gitea_admin_token, chineseroom_gitea_mirror_token (set in gitea_users.yml)

- name: Check if mirror org exists
  uri:
    url: "https://{{ chineseroom_gitea_domain }}/api/v1/orgs/{{ chineseroom_gitea_mirror_org }}"
    headers:
      Authorization: "token {{ chineseroom_gitea_mirror_token }}"
    method: GET
    status_code: [200, 404]
  register: _mirror_org_check

- name: Create mirror org
  uri:
    url: "https://{{ chineseroom_gitea_domain }}/api/v1/orgs"
    headers:
      Authorization: "token {{ chineseroom_gitea_mirror_token }}"
    method: POST
    body_format: json
    body:
      username: "{{ chineseroom_gitea_mirror_org }}"
      visibility: private
    status_code: 201
  when: _mirror_org_check.status == 404

- name: Get teams in mirror org
  uri:
    url: "https://{{ chineseroom_gitea_domain }}/api/v1/orgs/{{ chineseroom_gitea_mirror_org }}/teams"
    headers:
      Authorization: "token {{ chineseroom_gitea_mirror_token }}"
    method: GET
    status_code: 200
  register: _mirror_org_teams

- name: Create admin team
  uri:
    url: "https://{{ chineseroom_gitea_domain }}/api/v1/orgs/{{ chineseroom_gitea_mirror_org }}/teams"
    headers:
      Authorization: "token {{ chineseroom_gitea_mirror_token }}"
    method: POST
    body_format: json
    body:
      name: "{{ chineseroom_gitea_mirror_team_admin }}"
      permission: admin
      includes_all_repositories: true
      units:
        - repo.code
        - repo.pulls
    status_code: 201
  when: >-
    (_mirror_org_teams.json
      | selectattr('name', 'equalto', chineseroom_gitea_mirror_team_admin)
      | list | length) == 0

- name: Create readwrite team
  uri:
    url: "https://{{ chineseroom_gitea_domain }}/api/v1/orgs/{{ chineseroom_gitea_mirror_org }}/teams"
    headers:
      Authorization: "token {{ chineseroom_gitea_mirror_token }}"
    method: POST
    body_format: json
    body:
      name: "{{ chineseroom_gitea_mirror_team_readwrite }}"
      permission: write
      includes_all_repositories: true
      units:
        - repo.code
        - repo.pulls
    status_code: 201
  when: >-
    (_mirror_org_teams.json
      | selectattr('name', 'equalto', chineseroom_gitea_mirror_team_readwrite)
      | list | length) == 0

- name: Create readonly team
  uri:
    url: "https://{{ chineseroom_gitea_domain }}/api/v1/orgs/{{ chineseroom_gitea_mirror_org }}/teams"
    headers:
      Authorization: "token {{ chineseroom_gitea_mirror_token }}"
    method: POST
    body_format: json
    body:
      name: "{{ chineseroom_gitea_mirror_team_readonly }}"
      permission: read
      includes_all_repositories: true
      units:
        - repo.code
        - repo.pulls
    status_code: 201
  when: >-
    (_mirror_org_teams.json
      | selectattr('name', 'equalto', chineseroom_gitea_mirror_team_readonly)
      | list | length) == 0

# Re-fetch after potential creation to get current team IDs.
- name: Get teams in mirror org (refresh)
  uri:
    url: "https://{{ chineseroom_gitea_domain }}/api/v1/orgs/{{ chineseroom_gitea_mirror_org }}/teams"
    headers:
      Authorization: "token {{ chineseroom_gitea_mirror_token }}"
    method: GET
    status_code: 200
  register: _mirror_org_teams_current

- name: Add mirrorbot to admin team
  uri:
    url: >-
      https://{{ chineseroom_gitea_domain }}/api/v1/teams/{{
        (_mirror_org_teams_current.json
          | selectattr('name', 'equalto', chineseroom_gitea_mirror_team_admin)
          | first).id
      }}/members/{{ chineseroom_gitea_mirror_user }}
    headers:
      Authorization: "token {{ chineseroom_gitea_mirror_token }}"
    method: PUT
    status_code: [200, 204]
