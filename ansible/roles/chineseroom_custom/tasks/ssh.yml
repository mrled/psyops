---
- name: Enable post-quantum KEX algorithms on Fedora 42+
  when:
    - ansible_distribution == 'Fedora'
    - ansible_distribution_major_version | int >= 42
  block:
    - name: Drop post-quantum KEX sshd config
      ansible.builtin.copy:
        dest: /etc/ssh/sshd_config.d/10-postquantum-kex.conf
        content: |
          # Enable post-quantum key exchange algorithms (Fedora 42+)
          KexAlgorithms mlkem768x25519-sha256,sntrup761x25519-sha512@openssh.com,curve25519-sha256,curve25519-sha256@libssh.org,ecdh-sha2-nistp256,ecdh-sha2-nistp384,ecdh-sha2-nistp521,diffie-hellman-group-exchange-sha256
        owner: root
        group: root
        mode: "0600"
      notify: Restart sshd
