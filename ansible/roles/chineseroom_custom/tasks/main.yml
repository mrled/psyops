---
- name: Configure user
  ansible.builtin.import_tasks: user.yml
  tags:
    - chineseroom_user

- name: Install useless UI bling
  ansible.builtin.import_tasks: pretty.yml
  tags:
    - chineseroom_pretty

- name: Configure IPv6
  ansible.builtin.import_tasks: ipv6.yml
  tags:
    - chineseroom_ipv6

- name: Configure Squid proxy
  ansible.builtin.import_tasks: squid.yml
  tags:
    - chineseroom_squid

- name: Apply network restrictions
  ansible.builtin.import_tasks: restrictnet.yml
  tags:
    - chineseroom_nftables

- name: Install apps for the system
  ansible.builtin.import_tasks: apps-system.yml
  tags:
    - chineseroom_apps_system

- name: Configure SSH
  ansible.builtin.import_tasks: ssh.yml
  tags:
    - chineseroom_ssh
